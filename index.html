<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <!-- Importing the Anton font directly from Google Fonts -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            /* Sets the global font to Anton */
            font-family: 'Anton', sans-serif;
            background: linear-gradient(135deg, #090d16 0%, #111827 100%);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 20px;
            animation: fadeIn 1.2s ease-out;
        }
        h1 {
            font-size: 6rem; 
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        h2 {
            font-size: 4rem;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
            color: #818cf8; /* Soft blue accent color for the second line */
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Mobile phone optimization */
        @media (max-width: 600px) {
            h1 { font-size: 3.5rem; }
            h2 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Coming Soon</h1>
        <h2>For OUR Community</h2>
    </div>

</body>
</html>
