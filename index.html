<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <!-- We are importing a premium, clean font called Inter -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            /* FONT: Changed to 'Inter', a premium tech/startup style font */
            font-family: 'Inter', sans-serif;
            
            /* COLOUR: Change these two hex codes to change your background gradient */
            background: linear-gradient(135deg, #090d16 0%, #111827 100%);
            
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 800px;
            padding: 40px 20px;
            animation: fadeIn 1.2s ease-out;
        }
        .badge {
            /* ACCENT COLOUR: Change #6366f1 to change the tiny badge outline color */
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
            padding: 8px 20px;
            border-radius: 50px;
            
            /* SIZE: Made the "Under Construction" badge text larger */
            font-size: 1.1rem; 
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: inline-block;
            margin-bottom: 32px;
            border: 2px solid rgba(99, 102, 241, 0.4);
        }
        h1 {
            /* SIZE: Boosted text size from 3.5rem to massive 5rem */
            font-size: 5rem; 
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 24px;
            letter-spacing: -2px;
            background: linear-gradient(to right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.4rem;
            color: #94a3b8;
            line-height: 1.6;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* This ensures it looks great on mobile phones too */
        @media (max-width: 600px) {
            h1 { font-size: 3rem; }
            .badge { font-size: 0.9rem; }
            p { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="badge">Under Construction</span>
        <h1>Something exciting is on the way</h1>
        <p>Our website is currently under development.</p>
    </div>

</body>
</html>
