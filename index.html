<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { text-align: center; max-width: 600px; padding: 40px 20px; animation: fadeIn 1.2s ease-out; }
        .badge { background: rgba(99, 102, 241, 0.15); color: #818cf8; padding: 6px 16px; border-radius: 50px; font-size: 0.85rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; display: inline-block; margin-bottom: 24px; border: 1px solid rgba(99, 102, 241, 0.3); }
        h1 { font-size: 3.5rem; font-weight: 800; line-height: 1.1; margin-bottom: 16px; letter-spacing: -1px; background: linear-gradient(to right, #ffffff, #cbd5e1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 1.15rem; color: #94a3b8; margin-bottom: 40px; line-height: 1.6; }
        .form-group { display: flex; gap: 10px; max-width: 450px; margin: 0 auto; background: rgba(255, 255, 255, 0.03); padding: 6px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); }
        input[type="email"] { flex: 1; background: transparent; border: none; padding: 12px 16px; color: #ffffff; font-size: 1rem; outline: none; }
        input[type="email"]::placeholder { color: #64748b; }
        button { background: #4f46e5; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s ease; }
        button:hover { background: #4338ca; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 480px) { h1 { font-size: 2.5rem; } .form-group { flex-direction: column; background: transparent; border: none; padding: 0; } input[type="email"] { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; margin-bottom: 10px; } button { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">Under Construction</span>
        <h1>Something exciting is on the way</h1>
        <p>Our website is currently under development. Leave your email below to be the first to know when we launch.</p>
        <div class="form-group">
            <input type="email" placeholder="Enter your email address" required>
            <button type="submit">Notify Me</button>
        </div>
    </div>
</body>
</html>
